name: Build Standalone WASM and Release
 
on:
  push:
    tags:
      - 'v*'
    branches: [ 'b*' ]
  workflow_dispatch:
 
jobs:
  build-wasm:
    runs-on: ubuntu-22.04
    env:
      EMSCRIPTEN_VERSION: 3.1.61
      
    steps:
    - uses: actions/checkout@v4

    - name: Prepare build variables
      id: prep
      run: |
        # 提取版本号
        VERSION=${GITHUB_REF_NAME}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
    
    - name: Install Emscripten
      run: ./scripts/install-ci-linux.sh
    
    - name: Build standalone WASM
      run: |
        echo '==> start source emsdk_env'
        source ./emscripten/emsdk/emsdk_env.sh
        echo '==> start build'
        STANDALONE=1 bash -x ./build-emscripten.sh .
        ls -lh
        cp libheif.wasm libheif-${{ env.VERSION }}-standalone.wasm

    - name: Package artifacts
      run: |
        # 创建包名
        PACKAGE_NAME="libheif-${{ env.VERSION }}-standalone-wasm.zip"
        
        # 添加文件到zip
        zip "$PACKAGE_NAME" libheif-${{ env.VERSION }}-standalone.wasm
    
    - name: upload-artifact
      uses: actions/upload-artifact@v4
      with:
        name: wasm-zip
        path: libheif-${{ env.VERSION }}-standalone-wasm.zip